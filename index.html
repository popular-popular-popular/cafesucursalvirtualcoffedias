<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Aroma del Río</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --white: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #ffffff;
    text-shadow: 0 0 2px rgba(0,0,0,0.3);
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 5%;
    background: #ffffff;
}

.logo {
    font-size: 1.6rem;
    color: #ffffff;
    text-decoration: none;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 2rem;
}

.nav-links a {
    color: #ffffff;
    text-decoration: none;
}

.hero {
    height: 90vh;
    background: #ffffff;
    display: flex;
    align-items: center;
}

.hero-content {
    padding: 0 5%;
    max-width: 600px;
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.btn {
    background: #ffffff;
    color: #ffffff;
    border: 1px solid #ddd;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
}

.section-padding {
    padding: 4rem 5%;
}

.grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid #eee;
}

.card-img {
    height: 200px;
    background-size: cover;
}

.card-content {
    padding: 1rem;
}

footer {
    background: #ffffff;
    padding: 2rem 5%;
    text-align: center;
}

#cookie-banner {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #ffffff;
    padding: 1rem;
    display: flex;
    justify-content: space-between;
}

button {
    background: #ffffff;
    color: #ffffff;
    border: 1px solid #ddd;


</head>

<body>

<header>
<nav class="navbar">
<a href="/" class="logo"><i class="fa-solid fa-mug-hot"></i> Café Aroma del Río</a>

<ul class="nav-links">
<li><a href="/">Inicio</a></li>
<li><a href="#nosotros">Nosotros</a></li>
<li><a href="/prod.html">Menú</a></li>
<li><a href="#contacto">Contacto</a></li>
</ul>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>El mejor café artesanal en cada taza</h1>
<p>Disfruta bebidas calientes y postres.</p>
<a href="/prod.html" class="btn">Ver menú</a>
</div>
</section>

<section class="section-padding">
<h2>Sobre nosotros</h2>
<p>Somos una cafetería artesanal.</p>
</section>

<footer>
<p>© 2026 Café Aroma del Río</p>
</footer>

<div id="cookie-banner">
<p>Usamos cookies</p>
<button onclick="acceptCookies()">Aceptar</button>
</div>

<script>
function acceptCookies(){
document.getElementById("cookie-banner").style.display="none";
}
</script>

</body>
</html>
